site_name: torchid
site_url: https://isaac.earth/torchid/
site_description: GPU-accelerated intrinsic dimension estimators in PyTorch (port of scikit-dimension)
repo_url: https://github.com/isaaccorley/torchid
repo_name: isaaccorley/torchid

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.footer
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Estimators: estimators.md
  - API Reference: api.md
  - Performance: performance.md
  - Architecture: architecture.md
  - Parity with scikit-dimension: parity.md
