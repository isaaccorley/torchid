name: docs

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7.3.1

      - name: Convert notebook tutorials to markdown
        run: |
          mkdir -p docs/tutorials
          uv run --python 3.13 --group docs jupyter nbconvert \
            --to markdown \
            --output-dir docs/tutorials \
            examples/embeddings_id.ipynb

      - name: Build docs site
        run: uv run --python 3.13 --with zensical zensical build --clean

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
